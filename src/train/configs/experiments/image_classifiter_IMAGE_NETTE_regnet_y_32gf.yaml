trainer:
  max_epochs: 100
  accelerator: auto
  callbacks:
    - class_path: lovely_deep_learning.callback.image_classifier.ImageClassifierCallback
      init_args:
        save_dir: tmp  # 在测试和预测时使用，一般指向logs目录
        test_only_save_mistake: true  # TODO
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        min_delta: 0.00
        patience: 10
        verbose: true
        mode: min
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_acc"
        filename: "{epoch:02d}-{val_acc:.2f}"
        save_top_k: 1
        save_last: true
        mode: max
  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: logs
        name: image_classifiter_IMAGE_NETTE  
        version: null
  profiler:
    class_path: lightning.pytorch.profilers.SimpleProfiler
    init_args:
      filename: profiler
      extended: true

        
data:
  class_path: lovely_deep_learning.data_module.image_nette.ImageNetteDataModule
  init_args:
    dataset_dir: datasets/IMAGENETTE/imagenette2-320
    train_csv_paths: [datasets/IMAGENETTE/train.csv]
    val_csv_paths: [datasets/IMAGENETTE/val.csv]
    test_csv_paths: [datasets/IMAGENETTE/val.csv]
    predict_csv_paths: [datasets/IMAGENETTE/predict.csv]
    key_map : {"img_path": "path_img", "class_name": "class_name", "class_id": "class_id"}
    map_class_id_to_class_name:
      0: "n01440764"
      1: "n02102040"
      2: "n02979186"
      3: "n03000684"
      4: "n03028079"
      5: "n03394916"
      6: "n03417042"
      7: "n03425413"
      8: "n03445777"
      9: "n03888257"
    norm_mean : [0.485, 0.456, 0.406]
    norm_std : [0.229, 0.224, 0.225]  
    batch_size: 16
    num_workers: 8
    transform_train:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [224,224]
              interpolation: 2 # bilinear
          - class_path: torchvision.transforms.v2.TrivialAugmentWide
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: [0.485, 0.456, 0.406]
              std: [0.229, 0.224, 0.225]
    transform_val:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [224,224]
              interpolation: 2 # bilinear
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: [0.485, 0.456, 0.406]
              std: [0.229, 0.224, 0.225]
        
        
model:
  class_path: lovely_deep_learning.module.image_classifier.ImageClassifierModule
  init_args:
    learning_rate: 2e-4
    init_type: null
    optimizer:
      class_path: torch.optim.Adam
      init_args:
        lr: 2e-4
    lr_scheduler:
      class_path: torch.optim.lr_scheduler.StepLR
      init_args:
        step_size: 5
        gamma: 0.1
    model:
      model_name: resnet18
      pretrained: true

      structure:
        inputs: [{name: input, shape: [3, 224, 224]}]
        outputs: [{name: classification, from: [fc]}]
        layers:
          - name: stem
            from: [input]
            module: lovely_deep_learning.nn.regnet.SimpleStemIN
            args: {width_in: 3, width_out: 32}

          - name: trunk_output
            from: [stem]
            module: torch.nn.Sequential
            children:
              - name: block1
                module: lovely_deep_learning.nn.regnet.AnyStage
                args: {width_in: 32, width_out: 232, stride: 2, depth: 2, group_width: 232, bottleneck_multiplier: 1.0, se_ratio: 0.25, stage_index: 1}
              - name: block2
                module: lovely_deep_learning.nn.regnet.AnyStage
                args: {width_in: 232, width_out: 696, stride: 2, depth: 5, group_width: 232, bottleneck_multiplier: 1.0, se_ratio: 0.25, stage_index: 2}
              - name: block3
                module: lovely_deep_learning.nn.regnet.AnyStage
                args: {width_in: 696, width_out: 1392, stride: 2, depth: 12, group_width: 232, bottleneck_multiplier: 1.0, se_ratio: 0.25, stage_index: 3}
              - name: block4
                module: lovely_deep_learning.nn.regnet.AnyStage
                args: {width_in: 1392, width_out: 3712, stride: 2, depth: 1, group_width: 232, bottleneck_multiplier: 1.0, se_ratio: 0.25, stage_index: 4}

          - name: avgpool
            from: [trunk_output]
            module: torch.nn.AdaptiveAvgPool2d
            args: {output_size: [1, 1]}

          - name: flatten
            from: [avgpool]
            module: torch.nn.Flatten
            args: {start_dim: 1}

          - name: fc
            from: [flatten]
            module: torch.nn.Linear
            args: {in_features: 3712, out_features: 1000}

      weight:
        path: pretrained_models/regnet_y_32gf-8db6d4b5.pth
        url: https://download.pytorch.org/models/regnet_y_32gf-8db6d4b5.pth
        map_location: cpu
        strict: false
        src_key_prefix: layers.
        src_key_slice_start: 0





