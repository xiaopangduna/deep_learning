trainer:
  max_epochs: 100
  accelerator: auto
  callbacks:
    - class_path: lovely_deep_learning.callback.image_classifier.ImageClassifierCallback
      init_args:
        save_dir: tmp  # 在测试和预测时使用，一般指向logs目录
        test_only_save_mistake: true  # TODO
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        min_delta: 0.00
        patience: 10
        verbose: true
        mode: min
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_acc"
        filename: "{epoch:02d}-{val_acc:.2f}"
        save_top_k: 1
        save_last: true
        mode: max
  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: logs
        name: image_classifiter_IMAGE_NETTE  
        version: null
  profiler:
    class_path: lightning.pytorch.profilers.SimpleProfiler
    init_args:
      filename: profiler
      extended: true

        
data:
  class_path: lovely_deep_learning.data_module.image_nette.ImageNetteDataModule
  init_args:
    dataset_dir: datasets/IMAGENETTE/imagenette2-320
    train_csv_paths: [datasets/IMAGENETTE/train.csv]
    val_csv_paths: [datasets/IMAGENETTE/val.csv]
    test_csv_paths: [datasets/IMAGENETTE/val.csv]
    predict_csv_paths: [datasets/IMAGENETTE/predict.csv]
    key_map : {"img_path": "path_img", "class_name": "class_name", "class_id": "class_id"}
    map_class_id_to_class_name:
      0: "n01440764"
      1: "n02102040"
      2: "n02979186"
      3: "n03000684"
      4: "n03028079"
      5: "n03394916"
      6: "n03417042"
      7: "n03425413"
      8: "n03445777"
      9: "n03888257"
    norm_mean : [0.485, 0.456, 0.406]
    norm_std : [0.229, 0.224, 0.225]  
    batch_size: 16
    num_workers: 8
    transform_train:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [224,224]
              interpolation: 2 # bilinear
          - class_path: torchvision.transforms.v2.TrivialAugmentWide
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: [0.485, 0.456, 0.406]
              std: [0.229, 0.224, 0.225]
    transform_val:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [224,224]
              interpolation: 2 # bilinear
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: [0.485, 0.456, 0.406]
              std: [0.229, 0.224, 0.225]
        
        
model:
  class_path: lovely_deep_learning.module.image_classifier.ImageClassifierModule
  init_args:
    learning_rate: 2e-4
    init_type: null
    optimizer:
      class_path: torch.optim.Adam
      init_args:
        lr: 2e-4
    lr_scheduler:
      class_path: torch.optim.lr_scheduler.StepLR
      init_args:
        step_size: 5
        gamma: 0.1
    model:
      model_name: swin_v2_t
      pretrained: true
      structure:
        inputs: [{name: input, shape: [3, 256, 256]}]
        outputs: [{name: classification, from: [head]}]
        layers:
          - name: features
            from: [input]
            module: torch.nn.Sequential
            children:
              - name: "0"
                module: lovely_deep_learning.nn.swin_v2.PatchEmbed
                args: {embed_dim: 96, patch_size: [4, 4], norm_eps: 1.0e-05}

              - name: "1"
                module: torch.nn.Sequential
                children:
                  - name: "0"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 96, num_heads: 3, window_size: [8, 8], shift_size: [0, 0], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.0, norm_eps: 1.0e-05}
                  - name: "1"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 96, num_heads: 3, window_size: [8, 8], shift_size: [4, 4], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.018181818181818184, norm_eps: 1.0e-05}

              - name: "2"
                module: lovely_deep_learning.nn.swin_v2.PatchMergingV2
                args: {dim: 96, norm_eps: 1.0e-05}

              - name: "3"
                module: torch.nn.Sequential
                children:
                  - name: "0"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 192, num_heads: 6, window_size: [8, 8], shift_size: [0, 0], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.03636363636363637, norm_eps: 1.0e-05}
                  - name: "1"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 192, num_heads: 6, window_size: [8, 8], shift_size: [4, 4], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.05454545454545455, norm_eps: 1.0e-05}

              - name: "4"
                module: lovely_deep_learning.nn.swin_v2.PatchMergingV2
                args: {dim: 192, norm_eps: 1.0e-05}

              - name: "5"
                module: torch.nn.Sequential
                children:
                  - name: "0"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 384, num_heads: 12, window_size: [8, 8], shift_size: [0, 0], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.07272727272727274, norm_eps: 1.0e-05}
                  - name: "1"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 384, num_heads: 12, window_size: [8, 8], shift_size: [4, 4], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.09090909090909091, norm_eps: 1.0e-05}
                  - name: "2"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 384, num_heads: 12, window_size: [8, 8], shift_size: [0, 0], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.1090909090909091, norm_eps: 1.0e-05}
                  - name: "3"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 384, num_heads: 12, window_size: [8, 8], shift_size: [4, 4], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.1272727272727273, norm_eps: 1.0e-05}
                  - name: "4"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 384, num_heads: 12, window_size: [8, 8], shift_size: [0, 0], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.14545454545454548, norm_eps: 1.0e-05}
                  - name: "5"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 384, num_heads: 12, window_size: [8, 8], shift_size: [4, 4], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.16363636363636364, norm_eps: 1.0e-05}

              - name: "6"
                module: lovely_deep_learning.nn.swin_v2.PatchMergingV2
                args: {dim: 384, norm_eps: 1.0e-05}

              - name: "7"
                module: torch.nn.Sequential
                children:
                  - name: "0"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 768, num_heads: 24, window_size: [8, 8], shift_size: [0, 0], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.18181818181818182, norm_eps: 1.0e-05}
                  - name: "1"
                    module: lovely_deep_learning.nn.swin_v2.SwinTransformerBlockV2
                    args: {dim: 768, num_heads: 24, window_size: [8, 8], shift_size: [4, 4], mlp_ratio: 4.0, dropout: 0.0, attention_dropout: 0.0, stochastic_depth_prob: 0.2, norm_eps: 1.0e-05}

          - name: norm
            from: [features]
            module: torch.nn.LayerNorm
            args: {normalized_shape: 768, eps: 1.0e-05}

          - name: permute
            from: [norm]
            module: torchvision.ops.misc.Permute
            args: {dims: [0, 3, 1, 2]}

          - name: avgpool
            from: [permute]
            module: torch.nn.AdaptiveAvgPool2d
            args: {output_size: 1}

          - name: flatten
            from: [avgpool]
            module: torch.nn.Flatten
            args: {start_dim: 1}

          - name: head
            from: [flatten]
            module: torch.nn.Linear
            args: {in_features: 768, out_features: 10}

      weight:
        path: pretrained_models/swin_v2_t-b137f0e2.pth
        url: https://download.pytorch.org/models/swin_v2_t-b137f0e2.pth
        map_location: cpu
        strict: false
        src_key_prefix: layers.
        src_key_slice_start: 0