trainer:
  max_epochs: 100
  accelerator: auto
  callbacks:
    - class_path: lovely_deep_learning.callback.image_classifier.ImageClassifierCallback
      init_args:
        save_dir: tmp  # 在测试和预测时使用，一般指向logs目录
        test_only_save_mistake: true  # TODO
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        min_delta: 0.00
        patience: 10
        verbose: true
        mode: min
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_acc"
        filename: "{epoch:02d}-{val_acc:.2f}"
        save_top_k: 1
        save_last: true
        mode: max
  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: logs
        name: image_classifiter_IMAGE_NETTE  
        version: null
  profiler:
    class_path: lightning.pytorch.profilers.SimpleProfiler
    init_args:
      filename: profiler
      extended: true

        
data:
  class_path: lovely_deep_learning.data_module.image_nette.ImageNetteDataModule
  init_args:
    dataset_dir: datasets/IMAGENETTE/imagenette2-320
    train_csv_paths: [datasets/IMAGENETTE/train.csv]
    val_csv_paths: [datasets/IMAGENETTE/val.csv]
    test_csv_paths: [datasets/IMAGENETTE/val.csv]
    predict_csv_paths: [datasets/IMAGENETTE/predict.csv]
    key_map : {"img_path": "path_img", "class_name": "class_name", "class_id": "class_id"}
    map_class_id_to_class_name:
      0: "n01440764"
      1: "n02102040"
      2: "n02979186"
      3: "n03000684"
      4: "n03028079"
      5: "n03394916"
      6: "n03417042"
      7: "n03425413"
      8: "n03445777"
      9: "n03888257"
    norm_mean : [0.485, 0.456, 0.406]
    norm_std : [0.229, 0.224, 0.225]  
    batch_size: 16
    num_workers: 8
    transform_train:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [224,224]
              interpolation: 2 # bilinear
          - class_path: torchvision.transforms.v2.TrivialAugmentWide
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: [0.485, 0.456, 0.406]
              std: [0.229, 0.224, 0.225]
    transform_val:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [224,224]
              interpolation: 2 # bilinear
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: [0.485, 0.456, 0.406]
              std: [0.229, 0.224, 0.225]
        
        
model:
  class_path: lovely_deep_learning.module.image_classifier.ImageClassifierModule
  init_args:
    learning_rate: 2e-4
    init_type: null
    optimizer:
      class_path: torch.optim.Adam
      init_args:
        lr: 2e-4
    lr_scheduler:
      class_path: torch.optim.lr_scheduler.StepLR
      init_args:
        step_size: 5
        gamma: 0.1
    model:
      model_name: maxvit_t
      pretrained: true

      structure:
        inputs: [{name: input, shape: [3, 224, 224]}]
        outputs: [{name: classification, from: [maxvit]}]
        layers:
          - name: maxvit
            from: [input]
            module: lovely_deep_learning.nn.maxvit.MaxVitT
            args: {}

      weight:
        path: pretrained_models/maxvit_t-bc5ab103.pth
        url: https://download.pytorch.org/models/maxvit_t-bc5ab103.pth
        map_location: cpu
        strict: false
        src_key_prefix: layers.maxvit.
        src_key_slice_start: 0




