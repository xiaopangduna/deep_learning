# COCO8 目标检测实验：DAGNet(YOLOv8n) + 自研 DetectDAGNetLoss
# 用法（在 src/train 下）：lightning fit --config configs/experiments/object_detect_COCO8.yaml
# 数据首次运行会由 COCO8DataModule.prepare_data 下载 coco8.zip 并生成 CSV / 类别映射表

trainer:
  max_epochs: 100
  accelerator: auto
  callbacks:
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        min_delta: 0.0
        patience: 15
        verbose: true
        mode: min
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_loss"
        filename: "{epoch:02d}-{val_loss:.4f}"
        save_top_k: 1
        save_last: true
        mode: min

  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: logs
        name: object_detect_COCO8
        version: null
  profiler:
    class_path: lightning.pytorch.profilers.SimpleProfiler
    init_args:
      filename: profiler
      extended: true

data:
  class_path: lovely_deep_learning.data_module.coco8.COCO8DataModule
  init_args:
    dataset_dir: datasets/COCO8/coco8
    train_csv_paths: [datasets/COCO8/train.csv]
    val_csv_paths: [datasets/COCO8/val.csv]
    test_csv_paths: [datasets/COCO8/val.csv]
    predict_csv_paths: [datasets/COCO8/predict.csv]
    key_map:
      img_path: path_img
      object_label_path: path_label_detect_yolo
    predict_key_map:
      img_path: path_img
    map_class_id_to_class_name: datasets/COCO8/map_class_id_to_class_name.csv
    norm_mean: null
    norm_std: null
    batch_size: 16
    num_workers: 4
    transform_train:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [640, 640]
              interpolation: 2
          - class_path: torchvision.transforms.v2.RandomHorizontalFlip
            init_args:
              p: 0.5
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
    transform_val:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [640, 640]
              interpolation: 2
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true

model:
  class_path: lovely_deep_learning.module.object_detect.ObjectDetectModule
  init_args:
    optimizer:
      class_path: torch.optim.AdamW
      init_args:
        lr: 1.0e-4
        weight_decay: 5.0e-4
    lr_scheduler:
      class_path: torch.optim.lr_scheduler.CosineAnnealingLR
      init_args:
        T_max: 100
        eta_min: 1.0e-6
    loss:
      box_gain: 7.5
      cls_gain: 0.5
      dfl_gain: 1.5
      iou_match_thresh: 0.5
    model:
      model_name: yolov8_n
      pretrained: true
      weight:
        path: pretrained_models/yolov8n.pt
        url: https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt
        map_location: cpu
        strict: false
        src_key_prefix: layers.
        src_key_slice_start: 12
      structure:
        inputs: [{name: input, shape: [3, 640, 640]}]
        outputs: [{name: detect, from: ["22"]}]
        layers:
          - name: "0"
            from: ["input"]
            module: lovely_deep_learning.nn.conv.Conv
            args: {c1: 3, c2: 16, k: 3, s: 2}
          - name: "1"
            from: ["0"]
            module: lovely_deep_learning.nn.conv.Conv
            args: {c1: 16, c2: 32, k: 3, s: 2}
          - name: "2"
            from: ["1"]
            module: lovely_deep_learning.nn.block.C2f
            args: {c1: 32, c2: 32, n: 1, shortcut: true}
          - name: "3"
            from: ["2"]
            module: lovely_deep_learning.nn.conv.Conv
            args: {c1: 32, c2: 64, k: 3, s: 2}
          - name: "4"
            from: ["3"]
            module: lovely_deep_learning.nn.block.C2f
            args: {c1: 64, c2: 64, n: 2, shortcut: true}
          - name: "5"
            from: ["4"]
            module: lovely_deep_learning.nn.conv.Conv
            args: {c1: 64, c2: 128, k: 3, s: 2}
          - name: "6"
            from: ["5"]
            module: lovely_deep_learning.nn.block.C2f
            args: {c1: 128, c2: 128, n: 2, shortcut: true}
          - name: "7"
            from: ["6"]
            module: lovely_deep_learning.nn.conv.Conv
            args: {c1: 128, c2: 256, k: 3, s: 2}
          - name: "8"
            from: ["7"]
            module: lovely_deep_learning.nn.block.C2f
            args: {c1: 256, c2: 256, n: 1, shortcut: true}
          - name: "9"
            from: ["8"]
            module: lovely_deep_learning.nn.block.SPPF
            args: {c1: 256, c2: 256, k: 5}
          - name: "10"
            from: ["9"]
            module: torch.nn.modules.upsampling.Upsample
            args: {size: null, scale_factor: 2, mode: nearest}
          - name: "11"
            from: ["10", "6"]
            module: ultralytics.nn.modules.conv.Concat
            args: {dimension: 1}
          - name: "12"
            from: ["11"]
            module: lovely_deep_learning.nn.block.C2f
            args: {c1: 384, c2: 128, n: 1}
          - name: "13"
            from: ["12"]
            module: torch.nn.modules.upsampling.Upsample
            args: {size: null, scale_factor: 2, mode: nearest}
          - name: "14"
            from: ["13", "4"]
            module: ultralytics.nn.modules.conv.Concat
            args: {dimension: 1}
          - name: "15"
            from: ["14"]
            module: lovely_deep_learning.nn.block.C2f
            args: {c1: 192, c2: 64, n: 1}
          - name: "16"
            from: ["15"]
            module: lovely_deep_learning.nn.conv.Conv
            args: {c1: 64, c2: 64, k: 3, s: 2}
          - name: "17"
            from: ["16", "12"]
            module: ultralytics.nn.modules.conv.Concat
            args: {dimension: 1}
          - name: "18"
            from: ["17"]
            module: lovely_deep_learning.nn.block.C2f
            args: {c1: 192, c2: 128, n: 1}
          - name: "19"
            from: ["18"]
            module: lovely_deep_learning.nn.conv.Conv
            args: {c1: 128, c2: 128, k: 3, s: 2}
          - name: "20"
            from: ["19", "9"]
            module: ultralytics.nn.modules.conv.Concat
            args: {dimension: 1}
          - name: "21"
            from: ["20"]
            module: lovely_deep_learning.nn.block.C2f
            args: {c1: 384, c2: 256, n: 1}
          - name: "22"
            from: ["15", "18", "21"]
            module: lovely_deep_learning.nn.head.Detect
            args: {nc: 80, ch: [64, 128, 256], legacy: true, stride: [8, 16, 32], shape: [136, 64, 80, 80]}
