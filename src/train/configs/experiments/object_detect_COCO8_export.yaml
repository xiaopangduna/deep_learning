# 与 object_detect_COCO8 训练对齐的 ONNX 导出示例（仅 ``export:`` 段被 scripts/export.py 读取）
# 用法（在 src/train 下）：PYTHONPATH=src python scripts/export.py --config configs/experiments/object_detect_COCO8_export.yaml
#
# 下列 defaults 仅作文档说明基线配置；导出以 checkpoint 内超参为准，无需合并 YAML。

defaults:
  - object_detect_COCO8.yaml

export:
  ckpt_path: logs/object_detect_COCO8/version_1/checkpoints/epoch=01-val_loss=19.1486.ckpt
  format: onnx
  opset: 13
  input_shape: [1, 3, 640, 640]
  output_path: exports/model.onnx