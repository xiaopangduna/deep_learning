trainer:
  max_epochs: 50
  accelerator: auto
  # accumulate_grad_batches: 8
  callbacks:
    - class_path: lovely_deep_learning.callback.image_classifier.ImageClassifierTensorBoardImageLogCallback
    - class_path: lovely_deep_learning.callback.image_classifier.ImageClassifierTestAndPredictionWriterCallback
      init_args:
        save_dir: tmp       # 保存测试和预测结果的目录
        test_only_save_mistake: true  # 只保存测试和预测结果的错误样本
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: train_loss
        min_delta: 0.00
        patience: 15
        verbose: true
        mode: min
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_acc"
        filename: "{epoch:02d}-{val_acc:.2f}"
        save_top_k: 1
        save_last: true
        mode: max
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch   # 可选: "step" / "epoch" / null
        log_momentum: false      # 是否记录 momentum（一般不用）
        log_weight_decay: false  # 是否记录 weight decay
    # 冻结训练
    - class_path: lovely_deep_learning.callback.finetuning.DAGNetMilestoneUnfreezeFinetuning
      init_args:
        unfreeze_layers: ["classifier"]   # 自始可训的层（少）；其余 DAGNet.layers 先冻，到 unfreeze_epoch 一并解冻
        unfreeze_epoch: 50           # 须 < max_epochs；本配置 max_epochs=10 → current_epoch 为 0..9

  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: logs
        name: image_classifiter_IMAGE_NETTE  
        version: null
  # profiler:
  #   class_path: lightning.pytorch.profilers.SimpleProfiler
  #   init_args:
  #     filename: profiler
  #     extended: true

        
data:
  class_path: lovely_deep_learning.data_module.image_nette.ImageNetteDataModule
  init_args:
    dataset_dir: datasets/IMAGENETTE/imagenette2-320
    train_csv_paths: [datasets/IMAGENETTE/train.csv]
    val_csv_paths: [datasets/IMAGENETTE/val.csv]
    test_csv_paths: [datasets/IMAGENETTE/val.csv]
    predict_csv_paths: [datasets/IMAGENETTE/predict.csv]
    key_map : {"img_path": "path_img", "class_name": "class_name", "class_id": "class_id"}
    predict_key_map : {"img_path": "path_img"}
    map_class_id_to_class_name:
      0: "n01440764"
      1: "n02102040"
      2: "n02979186"
      3: "n03000684"
      4: "n03028079"
      5: "n03394916"
      6: "n03417042"
      7: "n03425413"
      8: "n03445777"
      9: "n03888257"
    norm_mean : [0.485, 0.456, 0.406]  # 归一化均值 必须与transform_val中的Normalize的mean一致
    norm_std : [0.229, 0.224, 0.225]  # 归一化标准差 必须与transform_val中的Normalize的std一致
    batch_size: 64
    num_workers: 8  # nproc 查看cpu核心数;先单核找到最大的batch_size，然后batch_size减少，提高num_workers,num_workers可以先用一半的cpu核心数
    transform_train:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [224,224]
              interpolation: 2 # bilinear
          - class_path: torchvision.transforms.v2.TrivialAugmentWide
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: [0.485, 0.456, 0.406]
              std: [0.229, 0.224, 0.225]
    transform_val:
      class_path: torchvision.transforms.v2.Compose
      init_args:
        transforms:
          - class_path: torchvision.transforms.v2.Resize
            init_args:
              size: [224,224]
              interpolation: 2 # bilinear
          - class_path: torchvision.transforms.v2.ToDtype
            init_args:
              dtype: torch.float32
              scale: true
          - class_path: torchvision.transforms.v2.Normalize
            init_args:
              mean: [0.485, 0.456, 0.406]
              std: [0.229, 0.224, 0.225]
          
model:
  class_path: lovely_deep_learning.module.image_classifier.ImageClassifierModule
  init_args:
    optimizer:
      class_path: torch.optim.Adam
      init_args:
        lr: 1e-4 # 随机初始化1e-2,微调1e-4
    lr_scheduler:
      class_path: torch.optim.lr_scheduler.StepLR
      init_args:
        step_size: 10
        gamma: 0.5
    criterion:
      class_path: lovely_deep_learning.loss.image_classifier.ImageClassifierCriterion
      init_args:
        label_smoothing: 0.0
    postprocess:
      class_path: lovely_deep_learning.postprocess.image_classifier.ImageClassifierPostProcessor
      init_args:
        temperature: 1.0
    metrics:
      class_path: lovely_deep_learning.metric.image_classifier.ImageClassifierMetric
      init_args:
        num_classes: 10
    model:
      model_name: mobilenet_v3_large
      pretrained: true
      weight:
        map_location: cpu
        strict: false
        stages: 
          - format: official
            path: pretrained_models/mobilenet_v3_large-5c1a4163.pth
            opts:
              url: https://download.pytorch.org/models/mobilenet_v3_large-5c1a4163.pth
              src_key_prefix: layers.
              src_key_slice_start: 0
        # 剪枝后微调：在 stages 中追加或替换，例如::
          # - format: torch_pruning
          #   path: logs/image_classifiter_IMAGE_NETTE/version_0/checkpoints/pruning0p25_epoch=02-val_acc=0.96.pth
      exporter:
        class_path: lovely_deep_learning.export.base.BaseExporter
        init_args:
          onnx_cfg:
            input_shape: [1, 3, 224, 224]
            path_save_onnx: null  # 如果不指定，则与pt同路径
            cfg_for_torch_onnx_export:
              export_params: true
              opset_version: 17
              input_names: ["images"]
              output_names: ["classification"]
          trt_cfg: {}
      pruner:
        class_path: lovely_deep_learning.pruning.image_classifier.ImageClassifierPruner
        init_args:
          ignored_layer_names: [classifier]  # DAGNet.layers 顶层键，非 torch_pruning 参数
          importance_cfg:
            class_name: GroupMagnitudeImportance
            init_args:
              p: 1
          tp_pruner_cfg:
            class_name: GroupNormPruner
            init_args:
              pruning_ratio: 0.25
              global_pruning: false
              round_to: null
              iterative_steps: 1

      structure:
        inputs: [{name: input, shape: [3, 224, 224]}]
        outputs: [{name: classification, from: [classifier]}]
        layers:
          - name: features
            from: [input]
            module: torch.nn.Sequential
            children:
              - name: "0"
                module: lovely_deep_learning.nn.mobilenet_v3.Conv2dNormActivation
                args: {in_channels: 3, out_channels: 16, kernel_size: 3, stride: 2, bn_eps: 0.001, bn_momentum: 0.01, activation_layer: hswish}
              - name: "1"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 16, kernel: 3, expanded_channels: 16, out_channels: 16, use_se: false, use_hs: false, stride: 1, dilation: 1}
              - name: "2"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 16, kernel: 3, expanded_channels: 64, out_channels: 24, use_se: false, use_hs: false, stride: 2, dilation: 1}
              - name: "3"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 24, kernel: 3, expanded_channels: 72, out_channels: 24, use_se: false, use_hs: false, stride: 1, dilation: 1}
              - name: "4"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 24, kernel: 5, expanded_channels: 72, out_channels: 40, use_se: true, use_hs: false, stride: 2, dilation: 1}
              - name: "5"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 40, kernel: 5, expanded_channels: 120, out_channels: 40, use_se: true, use_hs: false, stride: 1, dilation: 1}
              - name: "6"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 40, kernel: 5, expanded_channels: 120, out_channels: 40, use_se: true, use_hs: false, stride: 1, dilation: 1}
              - name: "7"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 40, kernel: 3, expanded_channels: 240, out_channels: 80, use_se: false, use_hs: true, stride: 2, dilation: 1}
              - name: "8"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 80, kernel: 3, expanded_channels: 200, out_channels: 80, use_se: false, use_hs: true, stride: 1, dilation: 1}
              - name: "9"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 80, kernel: 3, expanded_channels: 184, out_channels: 80, use_se: false, use_hs: true, stride: 1, dilation: 1}
              - name: "10"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 80, kernel: 3, expanded_channels: 184, out_channels: 80, use_se: false, use_hs: true, stride: 1, dilation: 1}
              - name: "11"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 80, kernel: 3, expanded_channels: 480, out_channels: 112, use_se: true, use_hs: true, stride: 1, dilation: 1}
              - name: "12"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 112, kernel: 3, expanded_channels: 672, out_channels: 112, use_se: true, use_hs: true, stride: 1, dilation: 1}
              - name: "13"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 112, kernel: 5, expanded_channels: 672, out_channels: 160, use_se: true, use_hs: true, stride: 2, dilation: 1}
              - name: "14"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 160, kernel: 5, expanded_channels: 960, out_channels: 160, use_se: true, use_hs: true, stride: 1, dilation: 1}
              - name: "15"
                module: lovely_deep_learning.nn.mobilenet_v3.InvertedResidual
                args: {input_channels: 160, kernel: 5, expanded_channels: 960, out_channels: 160, use_se: true, use_hs: true, stride: 1, dilation: 1}
              - name: "16"
                module: lovely_deep_learning.nn.mobilenet_v3.Conv2dNormActivation
                args: {in_channels: 160, out_channels: 960, kernel_size: 1, stride: 1, bn_eps: 0.001, bn_momentum: 0.01, activation_layer: hswish}

          - name: avgpool
            from: [features]
            module: torch.nn.AdaptiveAvgPool2d
            args: {output_size: 1}
          - name: flatten
            from: [avgpool]
            module: torch.nn.Flatten
            args: {start_dim: 1}
          - name: classifier
            from: [flatten]
            module: torch.nn.Sequential
            children:
              - {name: "0", module: torch.nn.Linear, args: {in_features: 960, out_features: 1280}}
              - {name: "1", module: torch.nn.Hardswish, args: {inplace: true}}
              - {name: "2", module: torch.nn.Dropout, args: {p: 0.2, inplace: true}}
              - {name: "3", module: torch.nn.Linear, args: {in_features: 1280, out_features: 10}}





